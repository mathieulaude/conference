apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  resource.customizations.health.apps.gitlab.com_GitLab: |
    health_status = {}
    health_status.status = "Progressing"
    health_status.message = "Gitlab is Preparing"
    if obj.status ~= nil then
      if obj.status.phase ~= nil then
        if obj.status.phase == "Running" then
          health_status.status = "Healthy"
          health_status.message = "Gitlab is Running"
        end
      end
    end
    return health_status

  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs
  resource.customizations.health.argoproj.io_ApplicationSet: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.resources ~= nil then
        for i, resource in ipairs(obj.status.resources) do
          if resource.health.status ~= nil then
            hs.status = resource.health.status
            if not (hs.status == 'Healthy') then
              return hs
            end
          end
        end
      end
    end
    return hs
